<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Focus Room</title>
    <link rel="stylesheet" href="pomodorotimer.css">
    <script src="pomodorotimer.js" defer></script>
</head>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background-color: #e0f6fc;
    }
</style>
<style>
    body {
        font-family: "Lato", sans-serif;
    }

    .sidenav {
        height: 100%;
        width: 180px;
        position: fixed;
        z-index: 1;
        top: 0;
        left: 0;
        background-color: #293241;
        overflow-x: hidden;
        padding-top: 20px;
    }

    .sidenav a {
        padding: 6px 8px 6px 16px;
        text-decoration: none;
        font-size: 25px;
        color: #f1f1f1;
        display: block;
    }

    .sidenav a:hover {
        color: #23bbe4;
    }

    .container {
        margin-left: 180px; /* Same as the width of the sidenav */
        font-size: 26px; /* Increased text to enable scrolling */
        padding: 0px 10px;
    }

    @media screen and (max-height: 450px) {
        .sidenav {padding-top: 15px;}
        .sidenav a {font-size: 18px;}
    }
</style>
<body>
    <div class="sidenav">
        <a href="display.html">Home</a>
        <a href="assignments.html">Assignments</a>
        <a href="calendar.html">Calendar</a>
        <a href="focusroom.html">Focus Room</a>
        <a href="about.html">About</a>
    </div>


    <div class="container">
        <div class="timer-container">
            <button id="pomodorobtn" class="active">Pomodoro</button>
            <button id="shortbrkbtn">Shortbreak</button>
            <button id="longbrkbtn">Long break</button>
        </div>
        <div class="pomdoro-count"></div>
        <div class="progressbar">
            <div class="progrsbar-inner">
                <h2 class="progressbar-number">25:00</h2>
            </div>
        </div>
        <div class="function-buttons">
            <button id="startbtn">Start</button>
            <button id="pausebtn">Pause</button>
            <button id="resetbtn">Reset</button>
        </div>
    </div>
</body>
</html>
