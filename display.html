<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Display Data</title>
</head>
<style>
    body{
    font-family: Arial, Helvetica, sans-serif;
    background-color: #e0f6fc;
}
</style>
<style>
    body {
        font-family: "Lato", sans-serif;
    }

    .sidenav {
        height: 100%;
        width: 180px;
        position: fixed;
        z-index: 1;
        top: 0;
        left: 0;
        background-color: #293241;
        overflow-x: hidden;
        padding-top: 20px;
    }

    .sidenav a {
        padding: 6px 8px 6px 16px;
        text-decoration: none;
        font-size: 25px;
        color: #f1f1f1;
        display: block;
    }

    .sidenav a:hover {
        color: #23bbe4;
    }

    #complete-task-btn {
        position: fixed;
        bottom: 30px; /* Distance from the bottom edge */
        right: 30px;  /* Distance from the right edge */

        padding: 12px 20px;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        z-index: 1000;
    }


    .container {
        margin-left: 180px; /* Same as the width of the sidenav */
        font-size: 26px; /* Increased text to enable scrolling */
        padding: 0px 10px;
    }

    @media screen and (max-height: 450px) {
        .sidenav {padding-top: 15px;}
        .sidenav a {font-size: 18px;}
    }
</style>
<body>

<div class="container">
    <h2> Your Profile </h2>
    <div id="formatted-date"></div>
    <div id="profile-data"></div>
    <!-- <button id="finishedBtn"> I finished my homework for today! </button> -->

    <h2>Study Streak</h2>
    <div id="streak-display">🔥 <span id="streak-count">0</span> Days</div>
    <button id="complete-task-btn">I finished my goals today!</button>
    <p id="message"></p>

</div>

<div class="sidenav">
    <a href="display.html">Home</a>
    <a href="assignments.html">Assignments</a>
    <a href="calendar.html">Calendar</a>
    <a href="focusroom.html">Focus Room</a>
    <a href="about.html">About</a>
</div>

<div class="profile-dropdown">
    <label for="menu-toggle" class="profile-trigger">
        <img src="logo.png" alt="Logo" width="120" height="132">
    </label>

    <input type="checkbox" id="menu-toggle" hidden>

    <ul class="menu-list">
        <li><a href="update.html">Update</a></li>
        <li><a href="logout.html">Logout</a></li>
    </ul>
</div>

<style>

    .profile-dropdown {
        position: fixed;
        top: 20px;
        right: 30px;
        z-index: 1000;
        font-family: sans-serif;
    }

    .profile-trigger {
        display: inline-block;
        cursor: pointer;
    }

    .profile-trigger img {
        display: block;
        border-radius: 15px;
        transition: all 0.3s ease;
        border: 3px solid transparent;
        object-fit: contain;
    }

    /* Hover & Active State for Logo */
    .profile-trigger:hover img,
    #menu-toggle:checked ~ .profile-trigger img {
        transform: scale(1.1);
        border: 3px solid #6c5ce7;
        box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
    }

    .menu-list {
        display: none;
        position: absolute;
        top: 110%;
        right: 0;
        background: white;
        border-radius: 10px;
        list-style: none;
        padding: 10px 0;
        margin: 0;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        min-width: 150px;
        overflow: hidden;
    }

    .menu-list li a {
        display: block;
        padding: 12px 20px;
        text-decoration: none;
        color: #333;
        font-size: 14px;
        transition: background 0.2s;
    }

    .menu-list li a:hover {
        background: #f5f5f5;
        color: #6c5ce7;
    }

    #menu-toggle:checked ~ .menu-list {
        display: block;
    }

</style>


<!-- add script data here later -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data.js"></script>
<script src="streak.js"></script>

</body>
</html>
