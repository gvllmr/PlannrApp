<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assignments</title>
    <link rel="stylesheet" href="Style.css">
</head>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background-color: #e0f6fc;
    }
</style>
<style>
    body {
        font-family: "Lato", sans-serif;
    }

    .sidenav {
        height: 100%;
        width: 180px;
        position: fixed;
        z-index: 1;
        top: 0;
        left: 0;
        background-color: #293241;
        overflow-x: hidden;
        padding-top: 20px;
    }

    .sidenav a {
        padding: 6px 8px 6px 16px;
        text-decoration: none;
        font-size: 25px;
        color: #f1f1f1;
        display: block;
    }

    .sidenav a:hover {
        color: #23bbe4;
    }

    .container {
        margin-left: 180px; /* Same as the width of the sidenav */
        font-size: 26px; /* Increased text to enable scrolling */
        padding: 0px 10px;
    }

    @media screen and (max-height: 450px) {
        .sidenav {padding-top: 15px;}
        .sidenav a {font-size: 18px;}
    }
</style>
<body>
    <div class="sidenav">
        <a href="display.html">Home</a>
        <a href="assignments.html">Assignments</a>
        <a href="calendar.html">Calendar</a>
        <a href="focusroom.html">Focus Room</a>
        <a href="about.html">About</a>
    </div>

    <h2 style="margin-bottom: 10px; margin-left: 180px;">My Assignments</h2>

    <div id="container">
        <p style="margin-bottom: 10px; margin-left: 180px;">Loading your assignments...</p>
    </div>
    <script src="view-assignments.js" defer></script>
    <div class="container">
        <button id="addAssignmentBtn">Add Assignment</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const addAssignmentBtn = document.getElementById("addAssignmentBtn");
    addAssignmentBtn.addEventListener("click", () => {
        window.location.href = 'addassignment.html';
    })

</script>

    <div id="undo-toast" class="toast hidden">
        Assignment completed!
        <button id="undo-action-btn">Undo</button>
    </div>
</body>
</html>
