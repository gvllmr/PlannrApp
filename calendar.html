<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calendar</title>
    <link rel="stylesheet" href="calendar.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Font Link for Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- <script src="data.js"></script> -->
    <script src="calendar.js" defer></script>
</head>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background-color: #e0f6fc;
    }
</style>
<style>
  body {
    font-family: "Lato", sans-serif;
  }

  .sidenav {
    height: 100%;
    width: 180px;
    position: fixed;
    z-index: 1;
    top: 0;
    left: 0;
    background-color: #293241;
    overflow-x: hidden;
    padding-top: 20px;
  }

  .sidenav a {
    padding: 6px 8px 6px 16px;
    text-decoration: none;
    font-size: 25px;
    color: #f1f1f1;
    display: block;
  }

  .sidenav a:hover {
    color: #23bbe4;
  }

  .container {
    margin-left: 180px; /* Same as the width of the sidenav */
    font-size: 26px; /* Increased text to enable scrolling */
    padding: 0px 10px;
  }

  @media screen and (max-height: 450px) {
    .sidenav {padding-top: 15px;}
    .sidenav a {font-size: 18px;}
  }
</style>
<body>
  <div class="sidenav">
      <a href="display.html">Home</a>
    <a href="assignments.html">Assignments</a>
    <a href="calendar.html">Calendar</a>
    <a href="focusroom.html">Focus Room</a>
    <a href="about.html">About</a>
  </div>
  <div class="wrapper">
      <header>
          <p class="current-date"></p>
          <div class="icons">
              <span id="prev" class="material-symbols-rounded">chevron_left</span>
              <span id="next" class="material-symbols-rounded">chevron_right</span>
          </div>
      </header>
      <div class="calendar">
          <ul class="weeks">
              <li>Sun</li>
              <li>Mon</li>
              <li>Tue</li>
              <li>Wed</li>
              <li>Thu</li>
              <li>Fri</li>
              <li>Sat</li>
          </ul>
          <ul class="days"></ul>
      </div>
  </div>

  <div class="app-container">
      <div class="calendar-wrapper">
          <button class="today-btn">Today</button>
      </div>

      <div id="assignment-sidebar" class="sidebar">
          <h3 id="selected-date-title">Select a date</h3>
          <ul id="day-assignment-list"></ul>
      </div>
  </div>
</body>
</html>
